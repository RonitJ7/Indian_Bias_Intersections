# ============================================================================
# Demographic Dimensions Configuration
# ============================================================================
# Each dimension defines a demographic attribute with possible values.
# Personas are generated by uniformly sampling one value per dimension.
#
# EXTENSIBILITY: To add a new dimension (e.g., income, caste, age),
# simply add a new block under 'dimensions:'. No code changes needed.
# ============================================================================

dimensions:
  sex:
    question: "What is the sex that you were assigned at birth?"
    values:
      - "Male"
      - "Female"

  race:
    question: "What is your race or origin?"
    values:
      - "White"
      - "Black"
      - "Asian"
      - "Hispanic"
      - "Other"

  religion:
    question: "What is your present religion, if any?"
    values:
      - "Protestant"
      - "Roman Catholic"
      - "Mormon"
      - "Orthodox"
      - "Jewish"
      - "Muslim"
      - "Buddhist"
      - "Hindu"
      - "Atheist"
      - "Agnostic"
      - "Other"
      - "Nothing in particular"

  political_views:
    question: "In general, would you describe your political views as"
    values:
      - "Very conservative"
      - "Conservative"
      - "Moderate"
      - "Liberal"
      - "Very liberal"

  political_party:
    question: "In politics today, do you consider yourself a"
    values:
      - "Republican"
      - "Democrat"
      - "Independent"
      - "Something else"
