# ============================================================================
# Demographic Dimensions Configuration
# ============================================================================
# Each dimension defines a demographic attribute with possible values.
# Personas are generated by uniformly sampling one value per dimension.
#
# EXTENSIBILITY: To add a new dimension (e.g., income, caste, age),
# simply add a new block under 'dimensions:'. No code changes needed.
#
# INTERACTIONS: Add pairs here to include interaction terms in the regression.
# Each pair is a [dim1, dim2] list. Any two valid dimension keys work.
# ============================================================================

interactions:
  - [religion, caste]
  - [region, caste]
  - [region, education]

dimensions:
  sex:
    question: "What is the sex that you were assigned at birth?"
    values:
      - "Male"
      - "Female"

  religion:
    question: "What is your present religion, if any?"
    values:
      - "Protestant"
      - "Roman Catholic"
      - "Mormon"
      - "Orthodox"
      - "Jewish"
      - "Muslim"
      - "Buddhist"
      - "Hindu"
      - "Atheist"
      - "Agnostic"
      - "Other"
      - "Nothing in particular"

  Region:
    question: "Where in India are you from?"
    values:
      - "North India"
      - "South India"
      - "North East India"
    
  Education:
    question: "What is the highest level of education you have completed?"
    values:
      - "Less than high school"
      - "High school graduate"
      - "Some college, no degree"
      - "Associate’s degree"
      - "College graduate/some postgrad"
      - "Postgraduate"
    
  Caste:
    question: "What is your caste?"
    values:
      - "General"
      - "OBC"
      - "SC"
      - "ST"

    
